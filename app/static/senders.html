<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>寄件人列表</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif; margin: 20px; background: #f6f8fb; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
      .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
      input { padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; width: 100%; box-sizing: border-box; }
      button { border: none; border-radius: 8px; background: #2563eb; color: #fff; padding: 8px 12px; cursor: pointer; margin-right: 8px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { border-bottom: 1px solid #eee; text-align: left; padding: 8px; vertical-align: top; }
      .muted { color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="card">
      <button onclick="window.location.href='/'">返回首页</button>
      <h2>寄件人列表（增删改查）</h2>
      <div class="row">
        <input id="name" placeholder="姓名" />
        <input id="phone" placeholder="电话" />
        <input id="street" placeholder="路名" />
        <input id="houseNo" placeholder="门牌号" />
        <input id="postcode" placeholder="邮编" />
        <input id="city" placeholder="城市" />
        <input id="countryCode" placeholder="国家简称" />
        <input id="isDefault" placeholder="默认 true/false" />
      </div>
      <div style="margin-top:10px">
        <button id="createBtn">新增</button>
        <button id="updateBtn">更新选中</button>
        <button id="deleteBtn">删除选中</button>
        <span class="muted" id="statusInfo">未选择记录</span>
      </div>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>ID</th><th>姓名</th><th>电话</th><th>地址</th><th>国家</th><th>默认</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <script>
      let selectedId = null;
      let selected = null;
      function toBool(v) { return String(v).toLowerCase() === "true"; }
      function payload() {
        return {
          name: document.getElementById("name").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          street: document.getElementById("street").value.trim(),
          house_no: document.getElementById("houseNo").value.trim(),
          postcode: document.getElementById("postcode").value.trim(),
          city: document.getElementById("city").value.trim(),
          country_code: document.getElementById("countryCode").value.trim(),
          is_default: toBool(document.getElementById("isDefault").value || "false"),
        };
      }
      function fill(item) {
        document.getElementById("name").value = item.name || "";
        document.getElementById("phone").value = item.phone || "";
        document.getElementById("street").value = item.street || "";
        document.getElementById("houseNo").value = item.house_no || "";
        document.getElementById("postcode").value = item.postcode || "";
        document.getElementById("city").value = item.city || "";
        document.getElementById("countryCode").value = item.country_code || "";
        document.getElementById("isDefault").value = String(item.is_default);
      }
      async function refresh() {
        const res = await fetch("/api/v1/senders");
        const data = await res.json();
        const body = document.getElementById("rows");
        body.innerHTML = "";
        data.forEach((item) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${item.id}</td><td>${item.name}</td><td>${item.phone}</td><td>${item.street} ${item.house_no}, ${item.postcode} ${item.city}</td><td>${item.country_code}</td><td>${item.is_default}</td>`;
          tr.onclick = () => {
            selectedId = item.id;
            selected = item;
            fill(item);
            document.getElementById("statusInfo").textContent = `已选择 ID=${item.id}`;
          };
          body.appendChild(tr);
        });
      }
      document.getElementById("createBtn").onclick = async () => {
        await fetch("/api/v1/senders", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload()) });
        await refresh();
      };
      document.getElementById("updateBtn").onclick = async () => {
        if (!selectedId) return;
        const p = payload();
        if (!p.name) p.name = selected.name;
        if (!p.phone) p.phone = selected.phone;
        if (!p.street) p.street = selected.street;
        if (!p.house_no) p.house_no = selected.house_no;
        if (!p.postcode) p.postcode = selected.postcode;
        if (!p.city) p.city = selected.city;
        if (!p.country_code) p.country_code = selected.country_code;
        await fetch(`/api/v1/senders/${selectedId}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(p) });
        await refresh();
      };
      document.getElementById("deleteBtn").onclick = async () => {
        if (!selectedId) return;
        await fetch(`/api/v1/senders/${selectedId}`, { method: "DELETE" });
        selectedId = null;
        selected = null;
        document.getElementById("statusInfo").textContent = "未选择记录";
        await refresh();
      };
      refresh();
    </script>
  </body>
</html>
