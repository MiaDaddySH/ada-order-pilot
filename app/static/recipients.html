<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>收件人列表</title>
    <link rel="stylesheet" href="/static/admin.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="toolbar">
          <button class="secondary" onclick="window.location.href='/'">返回首页</button>
          <button class="secondary" onclick="window.location.href='/orders'">订单列表</button>
          <button class="secondary" onclick="window.location.href='/products'">商品列表</button>
          <button class="secondary" onclick="window.location.href='/senders'">寄件人列表</button>
        </div>
        <h2 class="title">收件人管理</h2>
        <div class="grid-4">
          <input id="name" placeholder="姓名（必填）" />
          <input id="phone" placeholder="手机号（必填）" />
          <input id="idCardNo" placeholder="身份证号码（建议填写）" />
          <input id="province" placeholder="省" />
          <input id="city" placeholder="市" />
          <input id="district" placeholder="区" />
          <input id="addressDetail" placeholder="详细地址（必填）" />
          <input id="rawAddress" placeholder="原始地址文本（可空）" />
          <input id="postcode" placeholder="邮编" />
        </div>
        <div class="actions" style="margin-top:10px">
          <button id="createBtn">新增</button>
          <button id="updateBtn">更新选中</button>
          <button class="danger" id="deleteBtn">删除选中</button>
          <input id="searchInput" placeholder="搜索：姓名/手机号/地址" style="max-width:260px" />
        </div>
        <div class="grid-2" style="margin-top:10px">
          <textarea id="batchRecipients" placeholder="批量导入文本（每行：姓名,手机号,身份证号,省,市,区,详细地址,原始地址,邮编）"></textarea>
          <div>
            <input id="recipientImage" type="file" accept="image/*" />
            <div class="actions" style="margin-top:8px">
              <button class="secondary" id="batchImportBtn">导入文本</button>
              <button class="secondary" id="imagePreviewBtn">图片识别预览</button>
              <button class="secondary" id="imageImportBtn">确认导入预览</button>
            </div>
            <pre id="previewOutput" style="margin-top:8px;max-height:180px;overflow:auto">[]</pre>
            <p class="hint" id="imageLoadingHint" style="display:none">图片解析中</p>
          </div>
        </div>
        <p class="hint" id="statusText">未选择记录</p>
      </div>
      <div class="card">
        <table>
          <thead>
            <tr><th>ID</th><th>姓名</th><th>手机号</th><th>省市区</th><th>详细地址</th><th>邮编</th></tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="pagination" style="margin-top:10px">
          <button class="secondary" id="prevBtn">上一页</button>
          <span class="hint" id="pageInfo">第 1 / 1 页</span>
          <button class="secondary" id="nextBtn">下一页</button>
        </div>
      </div>
    </div>
    <script>
      const pageSize = 10;
      let selectedId = null;
      let allRows = [];
      let page = 1;
      let previewRecipients = [];
      let loadingTimer = null;
      function setStatus(text, isErr = false) {
        const el = document.getElementById("statusText");
        el.textContent = text;
        el.className = isErr ? "hint status-err" : "hint status-ok";
      }
      function splitRegion(regionText) {
        const text = (regionText || "").trim();
        if (!text) return { province: null, city: null, district: null };
        let province = null;
        let city = null;
        let district = null;
        const provinceMatch = text.match(/^(.+?(?:省|自治区|特别行政区|市))/);
        let working = text;
        if (provinceMatch) {
          province = provinceMatch[1];
          working = working.slice(province.length);
        }
        const cityMatch = working.match(/^(.+?(?:市|州|盟|地区))/);
        if (cityMatch) {
          city = cityMatch[1];
          working = working.slice(city.length);
        } else if (province && province.endsWith("市")) {
          city = province;
        }
        const districtMatch = working.match(/^(.+?(?:区|县|旗|市))/);
        if (districtMatch) district = districtMatch[1];
        return { province, city, district };
      }
      function parseRecipientsFromCommaText(raw) {
        const lines = raw.split("\n").map((x) => x.trim()).filter(Boolean);
        return lines.map((line) => {
          const parts = line.split(",").map((x) => x.trim());
          const address = parts[6] || "";
          return {
            name: parts[0] || "",
            phone: parts[1] || "",
            id_card_no: parts[2] || null,
            province: parts[3] || null,
            city: parts[4] || null,
            district: parts[5] || null,
            address_detail: address,
            raw_address: parts[7] || address,
            postcode: parts[8] || null,
          };
        }).filter((x) => x.name && x.phone && x.address_detail && x.raw_address);
      }
      function parseRecipientsFromBlocks(raw) {
        const lines = raw.split("\n").map((x) => x.trim()).filter(Boolean);
        const recipients = [];
        let i = 0;
        while (i < lines.length) {
          if (!/^\d+$/.test(lines[i])) {
            i += 1;
            continue;
          }
          i += 1;
          const name = lines[i] || "";
          const phone = lines[i + 1] || "";
          let cursor = i + 2;
          if (!name || !phone || !/^1[3-9]\d{9}$/.test(phone)) {
            continue;
          }
          if (lines[cursor] === "中国") cursor += 1;
          const region = lines[cursor] || "";
          cursor += 1;
          const addressDetail = lines[cursor] || "";
          cursor += 1;
          let idCardNo = null;
          if (lines[cursor] && /^(?:\d{15}|\d{17}[\dXx])$/.test(lines[cursor])) {
            idCardNo = lines[cursor].toUpperCase();
            cursor += 1;
          }
          const regionParts = splitRegion(region);
          if (name && phone && addressDetail) {
            recipients.push({
              name,
              phone,
              id_card_no: idCardNo,
              province: regionParts.province,
              city: regionParts.city,
              district: regionParts.district,
              address_detail: addressDetail,
              raw_address: `${region}${addressDetail}`,
              postcode: null,
            });
          }
          i = cursor;
        }
        return recipients;
      }
      function parseBatchRecipients(raw) {
        const commaParsed = parseRecipientsFromCommaText(raw);
        if (commaParsed.length > 0) return commaParsed;
        return parseRecipientsFromBlocks(raw);
      }
      function setImageLoading(loading) {
        const previewBtn = document.getElementById("imagePreviewBtn");
        const importBtn = document.getElementById("imageImportBtn");
        const hint = document.getElementById("imageLoadingHint");
        previewBtn.disabled = loading;
        importBtn.disabled = loading;
        if (!loading) {
          if (loadingTimer) clearInterval(loadingTimer);
          loadingTimer = null;
          hint.style.display = "none";
          hint.textContent = "图片解析中";
          return;
        }
        hint.style.display = "block";
        let dots = 0;
        loadingTimer = setInterval(() => {
          dots = (dots + 1) % 4;
          hint.textContent = `图片解析中${".".repeat(dots)}`;
        }, 400);
      }
      function getPayload() {
        const name = document.getElementById("name").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const addressDetail = document.getElementById("addressDetail").value.trim();
        if (!name || !phone || !addressDetail) {
          throw new Error("姓名、手机号、详细地址为必填");
        }
        return {
          name,
          phone,
          id_card_no: document.getElementById("idCardNo").value.trim() || null,
          province: document.getElementById("province").value.trim() || null,
          city: document.getElementById("city").value.trim() || null,
          district: document.getElementById("district").value.trim() || null,
          address_detail: addressDetail,
          raw_address: document.getElementById("rawAddress").value.trim() || addressDetail,
          postcode: document.getElementById("postcode").value.trim() || null,
        };
      }
      function fillForm(item) {
        document.getElementById("name").value = item.name || "";
        document.getElementById("phone").value = item.phone || "";
        document.getElementById("idCardNo").value = item.id_card_no || "";
        document.getElementById("province").value = item.province || "";
        document.getElementById("city").value = item.city || "";
        document.getElementById("district").value = item.district || "";
        document.getElementById("addressDetail").value = item.address_detail || "";
        document.getElementById("rawAddress").value = item.raw_address || "";
        document.getElementById("postcode").value = item.postcode || "";
      }
      function filteredRows() {
        const q = document.getElementById("searchInput").value.trim().toLowerCase();
        if (!q) return allRows;
        return allRows.filter((x) => (`${x.name} ${x.phone} ${x.address_detail}`).toLowerCase().includes(q));
      }
      function renderTable() {
        const rows = filteredRows();
        const totalPage = Math.max(1, Math.ceil(rows.length / pageSize));
        page = Math.min(page, totalPage);
        const start = (page - 1) * pageSize;
        const current = rows.slice(start, start + pageSize);
        const body = document.getElementById("rows");
        body.innerHTML = "";
        current.forEach((item) => {
          const tr = document.createElement("tr");
          if (selectedId === item.id) tr.classList.add("selected");
          tr.innerHTML = `<td>${item.id}</td><td>${item.name}</td><td>${item.phone}</td><td>${item.province || ""}${item.city || ""}${item.district || ""}</td><td>${item.address_detail}</td><td>${item.postcode || ""}</td>`;
          tr.onclick = () => {
            selectedId = item.id;
            fillForm(item);
            renderTable();
            setStatus(`已选择 ID=${item.id}`);
          };
          body.appendChild(tr);
        });
        document.getElementById("pageInfo").textContent = `第 ${page} / ${totalPage} 页`;
        document.getElementById("prevBtn").disabled = page <= 1;
        document.getElementById("nextBtn").disabled = page >= totalPage;
      }
      async function loadData() {
        const res = await fetch("/api/v1/recipients");
        allRows = await res.json();
        renderTable();
      }
      document.getElementById("searchInput").oninput = () => { page = 1; renderTable(); };
      document.getElementById("prevBtn").onclick = () => { page -= 1; renderTable(); };
      document.getElementById("nextBtn").onclick = () => { page += 1; renderTable(); };
      document.getElementById("createBtn").onclick = async () => {
        try {
          await fetch("/api/v1/recipients", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(getPayload()) });
          await loadData();
          setStatus("新增成功");
        } catch (e) {
          setStatus(String(e), true);
        }
      };
      document.getElementById("updateBtn").onclick = async () => {
        if (!selectedId) return setStatus("请先选择记录", true);
        try {
          await fetch(`/api/v1/recipients/${selectedId}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(getPayload()) });
          await loadData();
          setStatus("更新成功");
        } catch (e) {
          setStatus(String(e), true);
        }
      };
      document.getElementById("deleteBtn").onclick = async () => {
        if (!selectedId) return setStatus("请先选择记录", true);
        if (!window.confirm(`确认删除收件人 ID=${selectedId} 吗？`)) return;
        await fetch(`/api/v1/recipients/${selectedId}`, { method: "DELETE" });
        selectedId = null;
        await loadData();
        setStatus("删除成功");
      };
      document.getElementById("batchImportBtn").onclick = async () => {
        try {
          const raw = document.getElementById("batchRecipients").value;
          const recipients = parseBatchRecipients(raw);
          if (!recipients.length) {
            return setStatus("没有可导入数据，请检查格式（逗号行或编号分行块）", true);
          }
          const res = await fetch("/api/v1/recipients/batch-upsert", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ recipients }),
          });
          if (!res.ok) throw new Error(await res.text());
          const data = await res.json();
          await loadData();
          setStatus(`文本导入成功，共 ${data.imported_count} 条`);
        } catch (e) {
          setStatus(String(e), true);
        }
      };
      document.getElementById("imageImportBtn").onclick = async () => {
        if (!previewRecipients.length) return setStatus("请先执行图片识别预览", true);
        if (!window.confirm(`确认导入预览到的 ${previewRecipients.length} 条收件人吗？`)) return;
        try {
          const res = await fetch("/api/v1/recipients/batch-upsert", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ recipients: previewRecipients }),
          });
          if (!res.ok) throw new Error(await res.text());
          const data = await res.json();
          await loadData();
          setStatus(`图片预览导入成功，共 ${data.imported_count} 条`);
        } catch (e) {
          setStatus(String(e), true);
        }
      };
      document.getElementById("imagePreviewBtn").onclick = async () => {
        try {
          setImageLoading(true);
          const fileInput = document.getElementById("recipientImage");
          const file = fileInput.files && fileInput.files[0];
          if (!file) return setStatus("请先选择图片文件", true);
          const imageBase64 = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
              const dataUrl = String(reader.result || "");
              const parts = dataUrl.split(",");
              if (parts.length < 2) {
                reject(new Error("图片读取失败"));
                return;
              }
              resolve(parts[1]);
            };
            reader.onerror = () => reject(new Error("图片读取失败"));
            reader.readAsDataURL(file);
          });
          const res = await fetch("/api/v1/recipients/parse-image", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image_base64: imageBase64, mime_type: file.type || "image/png" }),
          });
          if (!res.ok) throw new Error(await res.text());
          const data = await res.json();
          previewRecipients = data.recipients || [];
          document.getElementById("previewOutput").textContent = JSON.stringify(previewRecipients, null, 2);
          setStatus(`图片识别完成，共 ${previewRecipients.length} 条，请确认后导入`);
        } catch (e) {
          setStatus(String(e), true);
        } finally {
          setImageLoading(false);
        }
      };
      loadData();
    </script>
  </body>
</html>
