<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>收件人列表</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif; margin: 20px; background: #f6f8fb; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
      .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
      input { padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; width: 100%; box-sizing: border-box; }
      button { border: none; border-radius: 8px; background: #2563eb; color: #fff; padding: 8px 12px; cursor: pointer; margin-right: 8px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { border-bottom: 1px solid #eee; text-align: left; padding: 8px; vertical-align: top; }
      .muted { color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="card">
      <button onclick="window.location.href='/'">返回首页</button>
      <h2>收件人列表（增删改查）</h2>
      <div class="row">
        <input id="name" placeholder="姓名" />
        <input id="phone" placeholder="手机号" />
        <input id="province" placeholder="省" />
        <input id="city" placeholder="市" />
        <input id="district" placeholder="区" />
        <input id="addressDetail" placeholder="详细地址" />
        <input id="rawAddress" placeholder="原始地址文本" />
        <input id="postcode" placeholder="邮编" />
      </div>
      <div style="margin-top:10px">
        <button id="createBtn">新增</button>
        <button id="updateBtn">更新选中</button>
        <button id="deleteBtn">删除选中</button>
        <span class="muted" id="status">未选择记录</span>
      </div>
    </div>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th><th>姓名</th><th>手机号</th><th>省市区</th><th>详细地址</th><th>邮编</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <script>
      let selectedId = null;
      function payload() {
        return {
          name: document.getElementById("name").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          province: document.getElementById("province").value.trim() || null,
          city: document.getElementById("city").value.trim() || null,
          district: document.getElementById("district").value.trim() || null,
          address_detail: document.getElementById("addressDetail").value.trim(),
          raw_address: document.getElementById("rawAddress").value.trim() || document.getElementById("addressDetail").value.trim(),
          postcode: document.getElementById("postcode").value.trim() || null,
        };
      }
      function fill(item) {
        document.getElementById("name").value = item.name || "";
        document.getElementById("phone").value = item.phone || "";
        document.getElementById("province").value = item.province || "";
        document.getElementById("city").value = item.city || "";
        document.getElementById("district").value = item.district || "";
        document.getElementById("addressDetail").value = item.address_detail || "";
        document.getElementById("rawAddress").value = item.raw_address || "";
        document.getElementById("postcode").value = item.postcode || "";
      }
      async function refresh() {
        const res = await fetch("/api/v1/recipients");
        const data = await res.json();
        const body = document.getElementById("rows");
        body.innerHTML = "";
        data.forEach((item) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${item.id}</td><td>${item.name}</td><td>${item.phone}</td><td>${item.province || ""}${item.city || ""}${item.district || ""}</td><td>${item.address_detail}</td><td>${item.postcode || ""}</td>`;
          tr.onclick = () => {
            selectedId = item.id;
            fill(item);
            document.getElementById("status").textContent = `已选择 ID=${item.id}`;
          };
          body.appendChild(tr);
        });
      }
      document.getElementById("createBtn").onclick = async () => {
        await fetch("/api/v1/recipients", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload()) });
        await refresh();
      };
      document.getElementById("updateBtn").onclick = async () => {
        if (!selectedId) return;
        await fetch(`/api/v1/recipients/${selectedId}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload()) });
        await refresh();
      };
      document.getElementById("deleteBtn").onclick = async () => {
        if (!selectedId) return;
        await fetch(`/api/v1/recipients/${selectedId}`, { method: "DELETE" });
        selectedId = null;
        document.getElementById("status").textContent = "未选择记录";
        await refresh();
      };
      refresh();
    </script>
  </body>
</html>
