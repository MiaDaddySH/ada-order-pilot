<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>订单列表</title>
    <link rel="stylesheet" href="/static/admin.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="toolbar">
          <button class="secondary" onclick="window.location.href='/'">返回首页</button>
          <button class="secondary" onclick="window.location.href='/recipients'">收件人列表</button>
          <button class="secondary" onclick="window.location.href='/products'">商品列表</button>
          <button class="secondary" onclick="window.location.href='/senders'">寄件人列表</button>
        </div>
        <h2 class="title">订单管理</h2>
        <div class="grid-4">
          <input id="recipientId" placeholder="收件人ID（必填）" />
          <input id="status" placeholder="状态，例如 ready_to_upload" />
          <input id="confidence" placeholder="置信度，默认 1" />
          <input id="needsReview" placeholder="需复核 true/false" />
        </div>
        <div class="grid-2" style="margin-top:8px">
          <textarea id="sourceText" placeholder="source_text"></textarea>
          <textarea id="items" placeholder='商品JSON数组，必须为数组'></textarea>
        </div>
        <div class="actions" style="margin-top:10px">
          <button id="createBtn">新增订单</button>
          <button id="updateBtn">更新选中</button>
          <button class="danger" id="deleteBtn">删除选中</button>
          <input id="searchInput" placeholder="搜索：订单号/收件人/状态/商品代码" style="max-width:300px" />
        </div>
        <p class="hint" id="statusInfo">未选择记录</p>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>订单号</th><th>收件人</th><th>状态</th><th>商品</th><th>创建时间</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="pagination" style="margin-top:10px">
          <button class="secondary" id="prevBtn">上一页</button>
          <span class="hint" id="pageInfo">第 1 / 1 页</span>
          <button class="secondary" id="nextBtn">下一页</button>
        </div>
      </div>
    </div>
    <script>
      const pageSize = 10;
      let selectedId = null;
      let selectedOrder = null;
      let allRows = [];
      let page = 1;
      function parseBool(v) { return String(v || "").toLowerCase() === "true"; }
      function setStatus(text, isErr = false) {
        const el = document.getElementById("statusInfo");
        el.textContent = text;
        el.className = isErr ? "hint status-err" : "hint status-ok";
      }
      function buildPayload() {
        const recipientId = Number(document.getElementById("recipientId").value);
        if (!recipientId || Number.isNaN(recipientId)) throw new Error("收件人ID必须填写有效数字");
        const itemsRaw = document.getElementById("items").value.trim();
        const items = JSON.parse(itemsRaw || "[]");
        if (!Array.isArray(items) || items.length === 0) throw new Error("商品JSON数组不能为空");
        return {
          recipient_id: recipientId,
          source_text: document.getElementById("sourceText").value,
          confidence: Number(document.getElementById("confidence").value || 1),
          needs_review: parseBool(document.getElementById("needsReview").value || "false"),
          status: document.getElementById("status").value || "ready_to_upload",
          items,
        };
      }
      function fill(order) {
        selectedOrder = order;
        document.getElementById("recipientId").value = order.recipient_id;
        document.getElementById("status").value = order.status;
        document.getElementById("confidence").value = order.confidence;
        document.getElementById("needsReview").value = String(order.needs_review);
        document.getElementById("sourceText").value = order.source_text;
        document.getElementById("items").value = JSON.stringify(order.items, null, 2);
      }
      function filteredRows() {
        const q = document.getElementById("searchInput").value.trim().toLowerCase();
        if (!q) return allRows;
        return allRows.filter((x) => {
          const itemText = (x.items || []).map((i) => `${i.simple_code} ${i.product_name}`).join(" ");
          return (`${x.order_no} ${x.recipient_name} ${x.status} ${itemText}`).toLowerCase().includes(q);
        });
      }
      function renderTable() {
        const data = filteredRows();
        const totalPage = Math.max(1, Math.ceil(data.length / pageSize));
        page = Math.min(page, totalPage);
        const start = (page - 1) * pageSize;
        const current = data.slice(start, start + pageSize);
        const body = document.getElementById("rows");
        body.innerHTML = "";
        current.forEach((item) => {
          const tr = document.createElement("tr");
          if (selectedId === item.id) tr.classList.add("selected");
          const itemText = (item.items || []).map((x) => `${x.simple_code}*${x.quantity}`).join(", ");
          tr.innerHTML = `<td>${item.id}</td><td>${item.order_no}</td><td>${item.recipient_name}(${item.recipient_phone})</td><td>${item.status}</td><td>${itemText}</td><td>${item.created_at}</td>`;
          tr.onclick = () => {
            selectedId = item.id;
            fill(item);
            renderTable();
            setStatus(`已选择 ID=${item.id}`);
          };
          body.appendChild(tr);
        });
        document.getElementById("pageInfo").textContent = `第 ${page} / ${totalPage} 页`;
        document.getElementById("prevBtn").disabled = page <= 1;
        document.getElementById("nextBtn").disabled = page >= totalPage;
      }
      async function loadData() {
        const res = await fetch("/api/v1/orders");
        allRows = await res.json();
        renderTable();
      }
      document.getElementById("searchInput").oninput = () => { page = 1; renderTable(); };
      document.getElementById("prevBtn").onclick = () => { page -= 1; renderTable(); };
      document.getElementById("nextBtn").onclick = () => { page += 1; renderTable(); };
      document.getElementById("createBtn").onclick = async () => {
        try {
          await fetch("/api/v1/orders", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(buildPayload()) });
          await loadData();
          setStatus("新增成功");
        } catch (e) {
          setStatus(String(e), true);
        }
      };
      document.getElementById("updateBtn").onclick = async () => {
        if (!selectedId) return setStatus("请先选择记录", true);
        const payload = {
          status: document.getElementById("status").value || selectedOrder.status,
          needs_review: parseBool(document.getElementById("needsReview").value || String(selectedOrder.needs_review)),
          recipient_id: Number(document.getElementById("recipientId").value || selectedOrder.recipient_id),
        };
        await fetch(`/api/v1/orders/${selectedId}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
        await loadData();
        setStatus("更新成功");
      };
      document.getElementById("deleteBtn").onclick = async () => {
        if (!selectedId) return setStatus("请先选择记录", true);
        if (!window.confirm(`确认删除订单 ID=${selectedId} 吗？`)) return;
        await fetch(`/api/v1/orders/${selectedId}`, { method: "DELETE" });
        selectedId = null;
        selectedOrder = null;
        await loadData();
        setStatus("删除成功");
      };
      loadData();
    </script>
  </body>
</html>
