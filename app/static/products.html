<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商品列表</title>
    <link rel="stylesheet" href="/static/admin.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <div class="toolbar">
          <button class="secondary" onclick="window.location.href='/'">返回首页</button>
          <button class="secondary" onclick="window.location.href='/recipients'">收件人列表</button>
          <button class="secondary" onclick="window.location.href='/orders'">订单列表</button>
          <button class="secondary" onclick="window.location.href='/senders'">寄件人列表</button>
        </div>
        <h2 class="title">商品管理</h2>
        <div class="grid-3">
          <input id="name" placeholder="商品名称（必填）" />
          <input id="code" placeholder="简易代码（必填）" />
          <input id="status" placeholder="状态(1启用/0停用)" />
        </div>
        <div class="actions" style="margin-top:10px">
          <button id="createBtn">新增</button>
          <button id="updateBtn">更新选中</button>
          <button class="danger" id="deleteBtn">删除选中</button>
          <input id="searchInput" placeholder="搜索：商品名称/简易代码" style="max-width:260px" />
        </div>
        <p class="hint" id="statusInfo">未选择记录</p>
      </div>
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>商品名称</th><th>简易代码</th><th>状态</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
        <div class="pagination" style="margin-top:10px">
          <button class="secondary" id="prevBtn">上一页</button>
          <span class="hint" id="pageInfo">第 1 / 1 页</span>
          <button class="secondary" id="nextBtn">下一页</button>
        </div>
      </div>
    </div>
    <script>
      const pageSize = 12;
      let selectedId = null;
      let selected = null;
      let allRows = [];
      let page = 1;
      function setStatus(text, isErr = false) {
        const el = document.getElementById("statusInfo");
        el.textContent = text;
        el.className = isErr ? "hint status-err" : "hint status-ok";
      }
      function fill(item) {
        document.getElementById("name").value = item.product_name || "";
        document.getElementById("code").value = item.simple_code || "";
        document.getElementById("status").value = item.status;
      }
      function filteredRows() {
        const q = document.getElementById("searchInput").value.trim().toLowerCase();
        if (!q) return allRows;
        return allRows.filter((x) => (`${x.product_name} ${x.simple_code}`).toLowerCase().includes(q));
      }
      function renderTable() {
        const data = filteredRows();
        const totalPage = Math.max(1, Math.ceil(data.length / pageSize));
        page = Math.min(page, totalPage);
        const current = data.slice((page - 1) * pageSize, page * pageSize);
        const body = document.getElementById("rows");
        body.innerHTML = "";
        current.forEach((item) => {
          const tr = document.createElement("tr");
          if (selectedId === item.id) tr.classList.add("selected");
          tr.innerHTML = `<td>${item.id}</td><td>${item.product_name}</td><td>${item.simple_code}</td><td>${item.status}</td>`;
          tr.onclick = () => {
            selectedId = item.id;
            selected = item;
            fill(item);
            renderTable();
            setStatus(`已选择 ID=${item.id}`);
          };
          body.appendChild(tr);
        });
        document.getElementById("pageInfo").textContent = `第 ${page} / ${totalPage} 页`;
        document.getElementById("prevBtn").disabled = page <= 1;
        document.getElementById("nextBtn").disabled = page >= totalPage;
      }
      async function loadData() {
        const res = await fetch("/api/v1/products?include_inactive=true");
        allRows = await res.json();
        renderTable();
      }
      document.getElementById("searchInput").oninput = () => { page = 1; renderTable(); };
      document.getElementById("prevBtn").onclick = () => { page -= 1; renderTable(); };
      document.getElementById("nextBtn").onclick = () => { page += 1; renderTable(); };
      document.getElementById("createBtn").onclick = async () => {
        const productName = document.getElementById("name").value.trim();
        const simpleCode = document.getElementById("code").value.trim();
        if (!productName || !simpleCode) return setStatus("商品名称和简易代码为必填", true);
        await fetch("/api/v1/products", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ product_name: productName, simple_code: simpleCode }),
        });
        await loadData();
        setStatus("新增成功");
      };
      document.getElementById("updateBtn").onclick = async () => {
        if (!selectedId) return setStatus("请先选择记录", true);
        await fetch(`/api/v1/products/${selectedId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            product_name: document.getElementById("name").value || selected.product_name,
            simple_code: document.getElementById("code").value || selected.simple_code,
            status: Number(document.getElementById("status").value || selected.status),
          }),
        });
        await loadData();
        setStatus("更新成功");
      };
      document.getElementById("deleteBtn").onclick = async () => {
        if (!selectedId) return setStatus("请先选择记录", true);
        if (!window.confirm(`确认删除商品 ID=${selectedId} 吗？`)) return;
        await fetch(`/api/v1/products/${selectedId}`, { method: "DELETE" });
        selectedId = null;
        selected = null;
        await loadData();
        setStatus("删除成功");
      };
      loadData();
    </script>
  </body>
</html>
