<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>商品列表</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", sans-serif; margin: 20px; background: #f6f8fb; }
      .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; margin-bottom: 12px; }
      input { padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; width: 100%; box-sizing: border-box; margin-bottom: 8px; }
      button { border: none; border-radius: 8px; background: #2563eb; color: #fff; padding: 8px 12px; cursor: pointer; margin-right: 8px; }
      table { width: 100%; border-collapse: collapse; font-size: 13px; }
      th, td { border-bottom: 1px solid #eee; text-align: left; padding: 8px; }
      .muted { color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="card">
      <button onclick="window.location.href='/'">返回首页</button>
      <h2>商品列表（增删改查）</h2>
      <input id="name" placeholder="商品名称" />
      <input id="code" placeholder="简易代码" />
      <input id="status" placeholder="状态(1启用/0停用)" />
      <button id="createBtn">新增</button>
      <button id="updateBtn">更新选中</button>
      <button id="deleteBtn">删除选中</button>
      <span class="muted" id="statusInfo">未选择记录</span>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>ID</th><th>商品名称</th><th>简易代码</th><th>状态</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
    <script>
      let selectedId = null;
      let selected = null;
      function fill(item) {
        document.getElementById("name").value = item.product_name || "";
        document.getElementById("code").value = item.simple_code || "";
        document.getElementById("status").value = item.status;
      }
      async function refresh() {
        const res = await fetch("/api/v1/products?include_inactive=true");
        const data = await res.json();
        const body = document.getElementById("rows");
        body.innerHTML = "";
        data.forEach((item) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${item.id}</td><td>${item.product_name}</td><td>${item.simple_code}</td><td>${item.status}</td>`;
          tr.onclick = () => {
            selectedId = item.id;
            selected = item;
            fill(item);
            document.getElementById("statusInfo").textContent = `已选择 ID=${item.id}`;
          };
          body.appendChild(tr);
        });
      }
      document.getElementById("createBtn").onclick = async () => {
        await fetch("/api/v1/products", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ product_name: document.getElementById("name").value, simple_code: document.getElementById("code").value }),
        });
        await refresh();
      };
      document.getElementById("updateBtn").onclick = async () => {
        if (!selectedId) return;
        await fetch(`/api/v1/products/${selectedId}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            product_name: document.getElementById("name").value || selected.product_name,
            simple_code: document.getElementById("code").value || selected.simple_code,
            status: Number(document.getElementById("status").value || selected.status),
          }),
        });
        await refresh();
      };
      document.getElementById("deleteBtn").onclick = async () => {
        if (!selectedId) return;
        await fetch(`/api/v1/products/${selectedId}`, { method: "DELETE" });
        selectedId = null;
        selected = null;
        document.getElementById("statusInfo").textContent = "未选择记录";
        await refresh();
      };
      refresh();
    </script>
  </body>
</html>
